<!DOCTYPE html>
<html lang="vi">
    <header>
        <link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200;600&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitien.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chesino HD</title>
    </header>
    <body>
        <div class="head">
        <div class="bar">
            <h1 class="wel">Ví Tiền</h1>

        
        
    </div>
        <div class="row">
            <h1>Thông tin tài khoản</h1>
            <div class="column">
              <p>Tên chủ tài khoản : </p>
              <div class="card">
                <h3>DINH BAO NGOC</h3>
              </div>
            </div>
          
            <div class="column">
              <p>Mã số ví :</p>
              <div class="card">
                <h3>NGOC123</h3>
              </div>
            </div>
            
            <div class="column">
              <p>Số dư :</p>
              <div class="card">
                <h3>10.000đ</h3>
              </div>
            </div>

            <div class="column">
              <p>Chuyển tiền :</p>
              <div class="dck">
                <input class="ck" placeholder="Mã số ví">
                <button class="btnck">Đồng ý</button>
              </div>
            </div>
            
            <div class="column">
              <p>Mã thưởng :</p>
              <div class="dck">
                <input class="ck" placeholder="Mã thưởng">
                <button class="btnck">Đồng ý</button>
              </div>
            </div>

            <div class="column">
              <div class="lichsu">
                <h3>Lịch sử giao dịch</h3>
                <h4 class="trutien">18:00 - 19/06/2021 <br> HỆ THỐNG: đã trừ 0đ phí kích hoạt</h4>
                <h4>17:00 - 20/06/2021 <br> DINH MANH HUNG đã thưởng cho bạn 10.000đ</h4>
              </div>
            </div>
          </div>
        </div>
    </body>
</html>
