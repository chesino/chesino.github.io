* {
    box-sizing: border-box;
  }
.head {
  background-color: #00000098;
    position: sticky;
    padding: 20px;
    border-radius: 15px;
    border: 5px solid white;
    
}
.logo {

}
.menu {
    margin-left: 320px;

}
.column {
    float: left;
    width: 25%;
    padding: 0 10px;
  }
  
  /* Loại bỏ các lề thừa bên trái và bên phải do có phần đệm */
  .row {margin: 0 -5px;}
  /* Xóa số nổi sau các cộtXóa số nổi sau các cột */
  .row:after {
    content: "";
    display: table;
    clear: both;
  }
  
  /* Các cột đáp ứng  */
  @media screen and (max-width: 600px) {
    .column {
      width: 100%;
      display: block;
      margin-bottom: 20px;
    }
  }
  
  /* Tạo kiểu cho thẻ truy cập */
  .card {
    line-height: 2px;
    box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
    padding: 5px;
    background-color: rgba(0, 217, 255, 0.781);
    border-radius: 15px;
    border: 5px solid white;
  }
 

  .lichsu {
    box-shadow: 0px 4px 8px 0 rgba(0, 0, 0, 0.2);
