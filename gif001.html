<!DOCTYPE html>
<html>
  <head>

  <style>
body {
    text-align: center;
    background-color: #242424;

  .expire {
    color: red;
    font-size: 15px;
  }

img {
    display: block;
    margin-left: auto;
    margin-right: auto;
    max-width: 250px;
}
h3 {
    font-weight: bold;
}
.login {

    padding-bottom: 50px;
}
input {
    text-align: center;
    color: currentColor;
    width: 50%;
    font-size: 25px;
    background: transparent;
    border: 2px solid currentColor;
}

button {
    font-family: 'Source Code Pro', monospace;
    background-color: rgb(1, 145, 56);
    font-size: 30px;
    border: none;
}
.btn {
    padding-top: 10px;
}



  </style>
  <body>

<div class="coupon">

</div>
