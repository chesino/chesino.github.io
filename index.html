<!DOCTYPE html>
<html lang="vi">
<head>
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="logo.png" href="img/logo.png"/>
<title>Xiemix Tools.</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Teko&display=swap" rel="stylesheet">

</style>
</head>
<body>
<center>
<div class="header">
  <h1>XiemixTools</h1>
  <p>Power by ChesinoHD</p>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<div id="charging" class="fa"></div>

<label class="switch-dark-mode">
  <input type="checkbox" onclick="darkmode()">
  <span class="slider round"></span>
</label>


<!-- script Dark Mode -->
<script>
function darkmode() {
   var element = document.body;
   element.classList.toggle("dark-mode");  
}
</script>
<!-- /Dark Mode -->


<script>
function chargebattery() {
  var a;
  a = document.getElementById("charging");
  a.innerHTML = "&#xf244;";
  setTimeout(function () {
    a.innerHTML = "&#xf243;";
  }, 1000);
  setTimeout(function () {
    a.innerHTML = "&#xf242;";
  }, 2000);
  setTimeout(function () {
    a.innerHTML = "&#xf241;";
  }, 3000);
  setTimeout(function () {
    a.innerHTML = "&#xf240;";
  }, 4000);
}
chargebattery();
setInterval(chargebattery, 5000);
</script>

<button onclick="showtxt()">Click me</button>

<p id="showtext"></p>

<script>
var i = 0;
var txt = 'Đang phát hành....';
var speed = 10;

function showtxt() {
  if (i < txt.length) {
    document.getElementById("showtext").innerHTML += txt.charAt(i);
    i++;
    setTimeout(showtxt, speed);
  }
}
</script> 



</body>
</html>
